<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Add movie</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}" />
</head>


<body>
    <h1>Add movie</h1>
    <a th:href="@{/}" class="btn btn-outline-secondary">Back</a>

    <form th:object="${movie}" th:action="@{/savemovie}" method="post">
        <input type="hidden" name="city" th:value="${city}" />
        <div class="alert alert-danger" th:if="${#fields.hasAnyErrors()}">
            <ul>
                <li th:each="err : ${#fields.errors('*')}" th:text="${err}"></li>
            </ul>
        </div>
        <div>
            <label>Title</label>
            <input type="text" th:field="*{title}" />
        </div>

        <div>
            <label>Director</label>
            <input type="text" th:field="*{director}" />
        </div>

        <div>
            <label>Publication Year</label>
            <input type="number" th:field="*{publicationYear}" min=0 />
        </div>

        <div>
            <label>Duration</label>
            <input type="text" th:field="*{duration}" />
        </div>

        <div>
            <label>Price</label>
            <input type="number" step="0.01" th:field="*{price}" min=0 />
        </div>

        <div style="clear: both; display: block; height: 10px;"></div>
        <label>Genre</label>
        <select th:field="*{genre.id}" class="form-control">
            <option th:each="g : ${genres}" th:value="${g.id}" th:text="${g.name}">
            </option>
        </select>

        <label>Start time</label>
        <input type="datetime-local" name="startTime" class="form-control" />

        <div style="clear: both; display: block; height: 10px;"></div>


        <button class="btn btn-success" type="submit">Save</button>
        <a th:href="@{/}" class="btn btn-danger">Cancel</a>

    </form>


</body>

</html>
